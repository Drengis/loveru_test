services:

  # БД
  postgres:
    image: postgres:17-alpine
    container_name: loveru_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Миграции БД
  migrate:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: loveru_migrate
    command: php /var/www/html/migrate.php
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./backend-php/migrate.php:/var/www/html/migrate.php

  # Go: загрузка данных ФИАС 
  load-bd:
    build:
      context: .
      dockerfile: docker/go/Dockerfile
      args:
        APP_DIR: backend-go/load_bd
        APP_NAME: load_bd
    container_name: loveru_load_bd
    environment:
      DB_HOST: postgres
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  # Go: сборка адресов
  build-addresses:
    build:
      context: .
      dockerfile: docker/go/Dockerfile
      args:
        APP_DIR: backend-go/build_addresses
        APP_NAME: build_addresses
    container_name: loveru_build_addresses
    environment:
      DB_HOST: postgres
    depends_on:
      load-bd:
        condition: service_completed_successfully
    restart: "no"

  # PHP + Apache
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: loveru_web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
